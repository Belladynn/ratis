# ============================================================
# Ratis — Stack de production (Mac mini / VPS self-hosted)
# ============================================================
# Usage:
#   cp .env.example .env.prod              # puis remplir les valeurs prod
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
#
# Cible:
#   1. Mac mini (ARM64) quand tu migres depuis Railway dans ~1 mois.
#   2. VPS x86_64 (Hetzner/Scaleway) en secours.
#
# Ce que fait ce compose:
#   - Postgres 16 + Redis 7 managés localement
#   - OSRM (routing) avec une region France pré-téléchargée
#   - 5 webservices FastAPI (auth/product/list/rewards/notifier)
#   - Caddy comme reverse proxy TLS (Let's Encrypt auto) vers ratis.app
#
# Build multi-arch: `docker buildx build --platform linux/amd64,linux/arm64 ...`
# Les Dockerfile sont portables sans modification.
# ============================================================

services:
  # --- Données ---
  postgres:
    build:
      context: ./db
    image: ratis-postgis:16-3
    restart: unless-stopped
    environment:
      POSTGRES_DB: ratis_prod
      POSTGRES_USER: ratis
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}  # pragma: allowlist secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ratis -d ratis_prod"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ratis_net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ratis_net

  # --- Routing (OSRM) — OPTIONAL self-hosted ---
  # Expects pre-built /data/osrm/france-latest.osrm.* from a ratis_batch_osm_sync run.
  # Mount /data/osrm read-only so OSRM can serve but never mutate it.
  #
  # Behind the `osrm-local` profile : ne démarre que si tu actives ce profile
  # (ex `--profile self-hosted --profile osrm-local`). Sans ce profile,
  # `OSRM_BASE_URL` peut pointer ailleurs (public router.project-osrm.org en alpha,
  # OSRM hébergé sur Mac mini en V1, etc.).
  osrm:
    image: osrm/osrm-backend:v5.27.0
    profiles: ["osrm-local"]
    restart: unless-stopped
    command: ["osrm-routed", "--algorithm", "mld", "/data/france-latest.osrm"]
    volumes:
      - ./data/osrm:/data:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000/route/v1/driving/2.35,48.85;2.36,48.86"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - ratis_net

  # --- Webservices ---
  auth:
    build:
      context: .
      dockerfile: webservices/ratis_auth/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://ratis:${POSTGRES_PASSWORD}@postgres:5432/ratis_prod  # pragma: allowlist secret
      REDIS_URL: redis://redis:6379/0
      # Cross-service URLs MUST include the /api/v1 prefix — the FastAPI
      # routers in RW / NT are mounted at /api/v1, and rewards_client /
      # notifier_client build paths from the base URL without re-adding
      # the prefix. NOTIFIER_URL is the full /notify endpoint URL since
      # notifier_client POSTs directly without appending a path.
      REWARDS_BASE_URL: ${REWARDS_BASE_URL:-http://rewards:8004/api/v1}
      NOTIFIER_URL: ${NOTIFIER_URL:-http://notifier:8005/api/v1/notify}
      JWT_PRIVATE_KEY_PATH: /run/jwt/jwt_private.pem
      JWT_PUBLIC_KEY_PATH: /run/jwt/jwt_public.pem
      JWT_AUDIENCE: ${JWT_AUDIENCE:-ratis}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:?GOOGLE_CLIENT_ID is required}
      APPLE_CLIENT_ID: ${APPLE_CLIENT_ID:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:?INTERNAL_API_KEY is required}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-30}
      # Admin endpoints (PR11 — subscription manage). ADMIN_API_KEY gates the
      # /admin/* router mount ; ADMIN_TOTP_SECRET is required for mutations.
      # Same secrets as RW (single admin device) — see ratis_core/totp_service.
      ADMIN_API_KEY: ${ADMIN_API_KEY:-}
      ADMIN_TOTP_SECRET: ${ADMIN_TOTP_SECRET:-}
      RGPD_ANONYMIZE_SALT: ${RGPD_ANONYMIZE_SALT:?RGPD_ANONYMIZE_SALT is required}
      SENTRY_DSN: ${SENTRY_DSN:-}
    volumes:
      # RS256 keys — host-side secret files, mounted read-only. auth is
      # the issuer so it gets BOTH PEMs. Generated by gen-jwt-keys.sh on
      # the host, never in the repo.
      - ./secrets/jwt_private.pem:/run/jwt/jwt_private.pem:ro
      - ./secrets/jwt_public.pem:/run/jwt/jwt_public.pem:ro
    networks:
      - ratis_net

  product_analyser:
    build:
      context: .
      dockerfile: webservices/ratis_product_analyser/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://ratis:${POSTGRES_PASSWORD}@postgres:5432/ratis_prod  # pragma: allowlist secret
      REDIS_URL: redis://redis:6379/1
      # Cross-service URLs MUST include the /api/v1 prefix — the FastAPI
      # routers in RW / NT are mounted at /api/v1. NOTIFIER_URL is the
      # full /notify endpoint URL since notifier_client POSTs directly.
      NOTIFIER_URL: ${NOTIFIER_URL:-http://notifier:8005/api/v1/notify}
      # REWARDS_BASE_URL : PA's worker (receipt_task) calls rewards_client
      # for trigger_cashback_scan / notify_scan_accepted. Must include
      # /api/v1 — rewards_client builds f"{base}/rewards/...".
      REWARDS_BASE_URL: ${REWARDS_BASE_URL:-http://rewards:8004/api/v1}
      # Cross-service URL for the admin mini UI → AU user lookup calls
      # (UI-1.5). Service name in compose is `auth` (not ratis_auth) ;
      # /api/v1 prefix is mandatory because au_client uses paths like
      # /admin/users without re-adding the prefix.
      AU_BASE_URL: ${AU_BASE_URL:-http://auth:8001/api/v1}
      # Cross-service URL for the admin mini UI → RW admin-settings calls
      # (Bloc C). Same /api/v1 + service-name reasoning as AU_BASE_URL.
      RW_BASE_URL: ${RW_BASE_URL:-http://rewards:8004/api/v1}
      JWT_PUBLIC_KEY_PATH: /run/jwt/jwt_public.pem
      JWT_AUDIENCE: ${JWT_AUDIENCE:-ratis}
      R2_ENDPOINT_URL: ${R2_ENDPOINT_URL:?R2_ENDPOINT_URL is required}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:?R2_ACCESS_KEY_ID is required}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:?R2_SECRET_ACCESS_KEY is required}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:?R2_BUCKET_NAME is required}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      # HSP3 — secret partagé n8n↔PA pour la reprise inversée du workflow
      # db-write-pipeline (cf ARCH_n8n_pipelines.md § HSP-3 M2).
      # Distinct d'ADMIN_API_KEY ; n8n calcule HMAC(secret, sid+decision) sur la
      # reprise, PA le vérifie. Lifespan PA fail-fast si absent.
      N8N_RESUME_SECRET: ${N8N_RESUME_SECRET:?N8N_RESUME_SECRET is required}
      SENTRY_DSN: ${SENTRY_DSN:-}
      # LLM filter (Phase 2h v2). LLM_API_KEY empty/missing = filter
      # disabled, worker falls back to the legacy parse_receipt regex.
      # ADMIN_API_KEY gates the /admin/* router mount.
      LLM_PROVIDER: ${LLM_PROVIDER:-mistral}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_MODEL: ${LLM_MODEL:-}
      # Alpha debug instrumentation (PR #126). STORE_DEBUG=true + ADMIN_API_KEY
      # set → debug rows persisted, /admin/scans/<id>/debug endpoint live.
      STORE_DEBUG: ${STORE_DEBUG:-false}
      ADMIN_API_KEY: ${ADMIN_API_KEY:-}
    volumes:
      - ./secrets/jwt_public.pem:/run/jwt/jwt_public.pem:ro
    networks:
      - ratis_net

  # Celery worker for product_analyser — consumes the OCR queue (PaddleOCR
  # pipeline on receipts and labels). Same image as the API service, only
  # the command differs. Without this container, /scan/receipt persists the
  # image to R2 + creates the DB row, but the enqueued OCR job is never
  # consumed → receipts stay with NULL totals and SENTINEL_DATE='1970-01-01'
  # forever (alpha 2026-04-26 lesson — was missing from the prod compose).
  product_analyser_worker:
    build:
      context: .
      dockerfile: webservices/ratis_product_analyser/Dockerfile
    restart: unless-stopped
    command: ["celery", "-A", "celery_app", "worker", "--loglevel=info", "--concurrency=2"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://ratis:${POSTGRES_PASSWORD}@postgres:5432/ratis_prod  # pragma: allowlist secret
      REDIS_URL: redis://redis:6379/1
      # Cross-service URLs : same /api/v1 contract as the API service.
      NOTIFIER_URL: ${NOTIFIER_URL:-http://notifier:8005/api/v1/notify}
      # REWARDS_BASE_URL : the worker calls rewards_client for trigger_cashback_scan
      # / notify_scan_accepted on every accepted receipt. Without /api/v1, calls 404
      # silently (fire-and-forget swallows errors).
      REWARDS_BASE_URL: ${REWARDS_BASE_URL:-http://rewards:8004/api/v1}
      JWT_PUBLIC_KEY_PATH: /run/jwt/jwt_public.pem
      JWT_AUDIENCE: ${JWT_AUDIENCE:-ratis}
      R2_ENDPOINT_URL: ${R2_ENDPOINT_URL:?R2_ENDPOINT_URL is required}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:?R2_ACCESS_KEY_ID is required}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:?R2_SECRET_ACCESS_KEY is required}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:?R2_BUCKET_NAME is required}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      SENTRY_DSN: ${SENTRY_DSN:-}
      # LLM filter (Phase 2h v2). The worker actually invokes the LLM
      # filter in process_receipt — these vars MUST be set on the worker
      # too, not just the web service. LLM_API_KEY empty = filter disabled.
      LLM_PROVIDER: ${LLM_PROVIDER:-mistral}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_MODEL: ${LLM_MODEL:-}
      # Alpha debug instrumentation (PR #126). The worker writes to scan_debug
      # when STORE_DEBUG=true ; the admin endpoint lives on the web service.
      STORE_DEBUG: ${STORE_DEBUG:-false}
    volumes:
      - ./secrets/jwt_public.pem:/run/jwt/jwt_public.pem:ro
    networks:
      - ratis_net

  list_optimiser:
    build:
      context: .
      dockerfile: webservices/ratis_list_optimiser/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      # NB : OSRM n'est pas dans depends_on — il est optionnel (profile osrm-local).
      # Si OSRM n'est pas démarré localement, OSRM_BASE_URL doit pointer ailleurs
      # (public router.project-osrm.org pour alpha, Mac mini pour V1).
    environment:
      DATABASE_URL: postgresql+psycopg://ratis:${POSTGRES_PASSWORD}@postgres:5432/ratis_prod  # pragma: allowlist secret
      REDIS_URL: redis://redis:6379/2
      OSRM_BASE_URL: ${OSRM_BASE_URL:-http://osrm:5000}
      JWT_PUBLIC_KEY_PATH: /run/jwt/jwt_public.pem
      JWT_AUDIENCE: ${JWT_AUDIENCE:-ratis}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      SENTRY_DSN: ${SENTRY_DSN:-}
    volumes:
      - ./secrets/jwt_public.pem:/run/jwt/jwt_public.pem:ro
    networks:
      - ratis_net

  # Celery worker for list_optimiser — consumes the route-optimization queue
  # (OSRM calls + scoring). Same image as the API service, only the command
  # differs. Without this container, /lists/{id}/optimize enqueues a job that
  # is never consumed → optimised_routes never populated.
  list_optimiser_worker:
    build:
      context: .
      dockerfile: webservices/ratis_list_optimiser/Dockerfile
    restart: unless-stopped
    # PYTHONPATH = WORKDIR so absolute imports like ``from services.X``
    # and ``from worker.X`` resolve. Unlike ``uvicorn`` (API container)
    # which adds the script dir to sys.path implicitly, the ``celery``
    # script does NOT — task imports crash with ``No module named
    # 'services'`` at runtime, causing /lists/{id}/optimize to buffer
    # indefinitely as Celery retries the failing task. Confirmed by
    # 2026-05-13 worker logs : « ModuleNotFoundError: No module named
    # 'services' » in webservices/ratis_list_optimiser/worker/tasks.py:42.
    command: ["celery", "-A", "worker.celery_app", "worker", "--loglevel=info", "--concurrency=2"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://ratis:${POSTGRES_PASSWORD}@postgres:5432/ratis_prod  # pragma: allowlist secret
      REDIS_URL: redis://redis:6379/2
      OSRM_BASE_URL: ${OSRM_BASE_URL:-http://osrm:5000}
      JWT_PUBLIC_KEY_PATH: /run/jwt/jwt_public.pem
      JWT_AUDIENCE: ${JWT_AUDIENCE:-ratis}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      PYTHONPATH: /app/webservices/ratis_list_optimiser
      SENTRY_DSN: ${SENTRY_DSN:-}
    volumes:
      - ./secrets/jwt_public.pem:/run/jwt/jwt_public.pem:ro
    networks:
      - ratis_net

  rewards:
    build:
      context: .
      dockerfile: webservices/ratis_rewards/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://ratis:${POSTGRES_PASSWORD}@postgres:5432/ratis_prod  # pragma: allowlist secret
      JWT_PUBLIC_KEY_PATH: /run/jwt/jwt_public.pem
      JWT_AUDIENCE: ${JWT_AUDIENCE:-ratis}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      ADMIN_API_KEY: ${ADMIN_API_KEY:?ADMIN_API_KEY is required}
      ADMIN_TOTP_SECRET: ${ADMIN_TOTP_SECRET:?ADMIN_TOTP_SECRET is required}
      CASHBACK_WEBHOOK_SECRET: ${CASHBACK_WEBHOOK_SECRET:-}
      CASHBACK_WEBHOOK_SECRET_AFFILAE: ${CASHBACK_WEBHOOK_SECRET_AFFILAE:?CASHBACK_WEBHOOK_SECRET_AFFILAE is required}
      CASHBACK_WEBHOOK_SECRET_AWIN: ${CASHBACK_WEBHOOK_SECRET_AWIN:?CASHBACK_WEBHOOK_SECRET_AWIN is required}
      CASHBACK_WEBHOOK_SECRET_CJ: ${CASHBACK_WEBHOOK_SECRET_CJ:?CASHBACK_WEBHOOK_SECRET_CJ is required}
      GIFT_CARD_PROVIDER_KEY: ${GIFT_CARD_PROVIDER_KEY:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
    volumes:
      - ./secrets/jwt_public.pem:/run/jwt/jwt_public.pem:ro
    networks:
      - ratis_net

  notifier:
    build:
      context: .
      dockerfile: webservices/ratis_notifier/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://ratis:${POSTGRES_PASSWORD}@postgres:5432/ratis_prod  # pragma: allowlist secret
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:?INTERNAL_API_KEY is required}
      EXPO_PUSH_URL: ${EXPO_PUSH_URL:-https://exp.host/--/api/v2/push/send}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      SENTRY_DSN: ${SENTRY_DSN:-}
    networks:
      - ratis_net

  # --- Migrations runner (run-once, opt-in via profile) ---
  # Executes `alembic upgrade head` against $DATABASE_URL then exits 0. NEVER
  # starts on a regular `docker compose up` — guarded by the `migrate` profile.
  #
  # Usage (alpha — manual trigger before each deploy that adds migrations) :
  #   docker compose -f docker-compose.prod.yml --env-file .env.prod \
  #     --profile migrate run --rm migrations
  #
  # Why a dedicated service (not baked into auth or product_analyser) :
  #   - product_analyser is ~3.5 GB (PaddleOCR) — overkill for a 5 s alembic run
  #   - keeps migration execution decoupled from application boot, so a deploy
  #     can apply DDL before any app container restarts
  #   - history (KP "DP-alembic-in-image-broke-ci") : alembic was missing from
  #     prod images, forcing manual psql / UPDATE alembic_version surgery →
  #     zero migration tracking. Solved here once and for all.
  migrations:
    profiles: ["migrate"]
    build:
      context: .
      dockerfile: webservices/ratis_migrations/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://ratis:${POSTGRES_PASSWORD}@postgres:5432/ratis_prod  # pragma: allowlist secret
      # HSP4 (alembic 20260521_1100_apply_hsp4_agent_confinement.py) lit
      # AGENT_READ_PASSWORD pour CREATE ROLE agent_read. Sans cette ligne,
      # toute migration de cette classe échoue avec RuntimeError dès l'entrée
      # du upgrade() — le var n'est pas propagé depuis .env.prod sans
      # déclaration explicite ici. Découvert 2026-05-26 lors du run prod de
      # PR #550 (workaround : `-e AGENT_READ_PASSWORD=...` sur la commande).
      AGENT_READ_PASSWORD: ${AGENT_READ_PASSWORD:?AGENT_READ_PASSWORD is required for HSP4-class migrations}
    networks:
      - ratis_net

  # --- Batch runners (run-once, opt-in via per-batch profile) ---
  #
  # Pattern : one service per `batch/ratis_batch_*` directory, all sharing the
  # same `batch/Dockerfile` image. Each is gated behind its own profile
  # `batch_<name>` so it never starts on a regular `docker compose up`. Mirrors
  # the `migrations` profile above.
  #
  # Usage (manual one-shot, e.g. seed / debug rerun) :
  #   docker compose -f docker-compose.prod.yml --env-file .env.prod \
  #     --profile batch_<name> run --rm batch_<name> [--extra-args]
  #
  # Or via the wrapper script :
  #   ./run-prod-batch.sh <name> [--extra-args]
  #
  # NOTE : the GitHub Actions cron workflows (.github/workflows/batch_*.yml)
  # are NOT yet wired to these services — they still run against the runner-
  # local postgres. Migrating crons to "trigger run-on-prod via SSH" is a
  # follow-up PR. For now these services exist to (a) enable on-demand prod
  # runs (vrac_seed, mystery_announce) and (b) prepare the infra for the
  # cron migration.
  #
  # Why a shared image (batch/Dockerfile) and not 9 per-batch Dockerfiles :
  #   - All batches share the same base layer (python 3.12 + uv + ratis_core
  #     + psycopg) — duplicating the Dockerfile 9× would balloon registry
  #     storage and rebuild times for no benefit
  #   - `uv sync --all-packages` resolves the entire workspace once → every
  #     ratis-batch-* member is usable from the same .venv
  #   - Adding a new batch = 1 new service block here, no new Dockerfile

  batch_consensus:
    profiles: ["batch_consensus"]
    build:
      context: .
      dockerfile: batch/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://ratis:${POSTGRES_PASSWORD}@postgres:5432/ratis_prod  # pragma: allowlist secret
      SENTRY_DSN: ${SENTRY_DSN:-}
    command: ["batch/ratis_batch_consensus/consensus.py"]
    networks:
      - ratis_net

  batch_vrac_seed:
    profiles: ["batch_vrac_seed"]
    build:
      context: .
      dockerfile: batch/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://ratis:${POSTGRES_PASSWORD}@postgres:5432/ratis_prod  # pragma: allowlist secret
      SENTRY_DSN: ${SENTRY_DSN:-}
    command: ["batch/ratis_batch_vrac_seed/vrac_seed.py"]
    networks:
      - ratis_net

  batch_off_sync:
    profiles: ["batch_off_sync"]
    build:
      context: .
      dockerfile: batch/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://ratis:${POSTGRES_PASSWORD}@postgres:5432/ratis_prod  # pragma: allowlist secret
      OFF_USER_AGENT: ${OFF_USER_AGENT:-Ratis/0.1 (+https://ratis.app)}
      OFF_API_BASE_URL: ${OFF_API_BASE_URL:-https://world.openfoodfacts.org}
      SENTRY_DSN: ${SENTRY_DSN:-}
    command: ["batch/ratis_batch_off_sync/off_sync/main.py"]
    networks:
      - ratis_net

  # OBP (OpenBeautyFacts) — shares the off_sync image, only --source flips.
  # Cf plan PR2 § Task PR2-2. Per-source User-Agent / API URL fall back to the
  # Source registry defaults (`off_sync/sources.py`) ; env vars left
  # OFF-specific because the registry has them already, no override needed
  # in V1. Add per-source env vars only if ops needs a staging URL override.
  batch_obp_sync:
    profiles: ["batch_obp_sync"]
    build:
      context: .
      dockerfile: batch/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://ratis:${POSTGRES_PASSWORD}@postgres:5432/ratis_prod  # pragma: allowlist secret
      SENTRY_DSN: ${SENTRY_DSN:-}
    command: ["batch/ratis_batch_off_sync/off_sync/main.py", "--source", "obp"]
    networks:
      - ratis_net

  batch_osm_sync:
    profiles: ["batch_osm_sync"]
    build:
      context: .
      dockerfile: batch/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://ratis:${POSTGRES_PASSWORD}@postgres:5432/ratis_prod  # pragma: allowlist secret
      OSM_OVERPASS_URL: ${OSM_OVERPASS_URL:-https://overpass-api.de/api/interpreter}
      SENTRY_DSN: ${SENTRY_DSN:-}
    command: ["batch/ratis_batch_osm_sync/osm_sync.py"]
    networks:
      - ratis_net

  batch_purge:
    profiles: ["batch_purge"]
    build:
      context: .
      dockerfile: batch/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://ratis:${POSTGRES_PASSWORD}@postgres:5432/ratis_prod  # pragma: allowlist secret
      R2_ENDPOINT_URL: ${R2_ENDPOINT_URL:?R2_ENDPOINT_URL is required}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:?R2_ACCESS_KEY_ID is required}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:?R2_SECRET_ACCESS_KEY is required}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:?R2_BUCKET_NAME is required}
      SENTRY_DSN: ${SENTRY_DSN:-}
    command: ["batch/ratis_batch_purge/purge.py"]
    networks:
      - ratis_net

  batch_savings:
    profiles: ["batch_savings"]
    build:
      context: .
      dockerfile: batch/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://ratis:${POSTGRES_PASSWORD}@postgres:5432/ratis_prod  # pragma: allowlist secret
      SENTRY_DSN: ${SENTRY_DSN:-}
    command: ["batch/ratis_batch_savings/savings_batch.py"]
    networks:
      - ratis_net

  batch_referral_payout:
    profiles: ["batch_referral_payout"]
    build:
      context: .
      dockerfile: batch/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://ratis:${POSTGRES_PASSWORD}@postgres:5432/ratis_prod  # pragma: allowlist secret
      # /api/v1 prefix mandatory — payout.py uses rewards_client which
      # builds f"{base}/rewards/...".
      REWARDS_BASE_URL: ${REWARDS_BASE_URL:-http://rewards:8004/api/v1}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      SENTRY_DSN: ${SENTRY_DSN:-}
    command: ["batch/ratis_batch_referral_payout/payout.py"]
    networks:
      - ratis_net

  batch_mystery_announce:
    profiles: ["batch_mystery_announce"]
    build:
      context: .
      dockerfile: batch/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://ratis:${POSTGRES_PASSWORD}@postgres:5432/ratis_prod  # pragma: allowlist secret
      SENTRY_DSN: ${SENTRY_DSN:-}
    command: ["batch/ratis_batch_mystery_announce/mystery_announce.py"]
    networks:
      - ratis_net

  batch_achievements:
    profiles: ["batch_achievements"]
    build:
      context: .
      dockerfile: batch/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://ratis:${POSTGRES_PASSWORD}@postgres:5432/ratis_prod  # pragma: allowlist secret
      SENTRY_DSN: ${SENTRY_DSN:-}
    # The batch is invoked as a module so the rewards-service flat-layout
    # imports resolved by ``__main__.py``'s sys.path shim apply (cf
    # batch/Dockerfile § rewards copy + ARCH_BATCH_ACHIEVEMENTS).
    command: ["-m", "batch.ratis_batch_achievements"]
    networks:
      - ratis_net

  batch_reconciliation:
    profiles: ["batch_reconciliation"]
    build:
      context: .
      dockerfile: batch/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://ratis:${POSTGRES_PASSWORD}@postgres:5432/ratis_prod  # pragma: allowlist secret
      SENTRY_DSN: ${SENTRY_DSN:-}
    command: ["batch/ratis_batch_reconciliation/run.py"]
    networks:
      - ratis_net

  batch_push_receipts:
    profiles: ["batch_push_receipts"]
    build:
      context: .
      dockerfile: batch/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://ratis:${POSTGRES_PASSWORD}@postgres:5432/ratis_prod  # pragma: allowlist secret
      SENTRY_DSN: ${SENTRY_DSN:-}
    command: ["batch/ratis_batch_push_receipts/push_receipts.py"]
    networks:
      - ratis_net

  batch_sirene_sync:
    profiles: ["batch_sirene"]
    build:
      context: .
      dockerfile: batch/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://ratis:${POSTGRES_PASSWORD}@postgres:5432/ratis_prod  # pragma: allowlist secret
      SIRENE_BULK_URL: ${SIRENE_BULK_URL:-https://files.data.gouv.fr/insee-sirene/StockEtablissement_utf8.zip}
      GEOPLATEFORME_GEOCODE_URL: ${GEOPLATEFORME_GEOCODE_URL:-https://data.geopf.fr/geocodage}
      SIRENE_BULK_CACHE_DIR: ${SIRENE_BULK_CACHE_DIR:-/var/cache/ratis/sirene}
      SENTRY_DSN: ${SENTRY_DSN:-}
    command: ["batch/ratis_batch_sirene_sync/sirene_sync.py"]
    networks:
      - ratis_net

  # --- Reverse proxy TLS ---
  # Caddy handles Let's Encrypt automatically. Only needed for Mac mini / VPS;
  # Railway provides TLS at the edge, so skip this service there.
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - auth
      - product_analyser
      - list_optimiser
      - rewards
      - notifier
    networks:
      - ratis_net
    profiles:
      - self-hosted  # only start with: docker compose --profile self-hosted up

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:

networks:
  ratis_net:
    driver: bridge

# =============================================================================
# Loki single-binary config — Phase B.2 ITOps observability stack
# -----------------------------------------------------------------------------
# Mode : monolithic / single-binary (no microservices split, no replication).
# Auth : disabled — réseau privé Docker (itops_net) + bind localhost host-side.
# Storage : local filesystem (chunks + boltdb-shipper index).
# Retention : 14 jours (DA-41) — compactor purge automatique.
# Schema : v13 boltdb-shipper (recommandé pour single-binary < 5 TB de logs).
#
# Référence : https://grafana.com/docs/loki/latest/configure/
# =============================================================================

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: info

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

# Schema v13 + boltdb-shipper = pattern recommandé en single-binary.
# Le `from` doit être dans le passé pour que la config soit active immédiatement.
schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

# TSDB shipper config (remplace boltdb-shipper depuis Loki 2.8+, recommandé pour v13).
storage_config:
  tsdb_shipper:
    active_index_directory: /loki/tsdb-index
    cache_location: /loki/tsdb-cache
  filesystem:
    directory: /loki/chunks

# Limits — tweakés pour un setup single-host petit volume.
# `retention_period` doit aussi figurer ici en plus du compactor pour
# que Loki refuse les query au-delà de cette window.
limits_config:
  reject_old_samples: true
  reject_old_samples_max_age: 168h     # logs > 7j à l'ingestion = rejected
  retention_period: 336h                # 14 jours (DA-41) — query window
  max_query_length: 721h                # un peu > retention pour éviter edge errors
  ingestion_rate_mb: 8
  ingestion_burst_size_mb: 16
  # Permet à Promtail de pousser des labels custom sans cap arbitraire.
  max_label_name_length: 1024
  max_label_value_length: 4096
  max_label_names_per_series: 30
  allow_structured_metadata: true

# Compactor — gère la rétention en supprimant chunks/index expirés.
compactor:
  working_directory: /loki/compactor
  compaction_interval: 10m
  retention_enabled: true
  retention_delete_delay: 2h
  retention_delete_worker_count: 100
  delete_request_store: filesystem

# Pas d'analytics phoning home (privacy + offline-friendly).
analytics:
  reporting_enabled: false

# Querier — réglages minimes en single-binary.
querier:
  max_concurrent: 4

# Frontend — pas de split en single-binary mais on définit le min nécessaire.
frontend:
  max_outstanding_per_tenant: 1024

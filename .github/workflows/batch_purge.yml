name: batch-purge

on:
  push:
    branches: ["**"]
    paths:
      - "batch/ratis_batch_purge/**"
      - "ratis_core/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/batch_purge.yml"
  workflow_dispatch:
  # schedule:
  #   - cron: "0 3 * * *"    # purge quotidienne — désactivé (DB locale)

# Serialize runs per ref so a slow scheduled batch never overlaps the next
# tick. cancel-in-progress=false → the new run queues behind the running one.
concurrency:
  group: batch-purge-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uvx ruff check batch/ratis_batch_purge/

  sast:
    name: SAST (bandit)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      - run: uvx bandit[toml] -r batch/ratis_batch_purge/ -ll -q -c pyproject.toml

  test-purge:
    name: Tests — ratis_batch_purge
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint, sast]
    if: github.event_name != 'schedule'
    # Postgres 16 + PostGIS as an ephemeral service container, reachable on
    # localhost (GitHub maps the container port to the runner). The conftest
    # runs `CREATE EXTENSION postgis`, so a PostGIS image is required.
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: ratis
          POSTGRES_PASSWORD: ratis
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Create test database
        run: psql "postgresql://ratis:ratis@localhost:5432/postgres" -c "CREATE DATABASE ratis_test_purge" 2>/dev/null || true
      - name: Install dependencies
        run: uv sync --all-groups --all-packages
      - name: Run tests (ratis_batch_purge)
        run: uv run pytest batch/ratis_batch_purge/tests/ -q
        env:
          PYTHONPATH: batch/ratis_batch_purge
          DATABASE_URL: postgresql+psycopg://ratis:ratis@localhost:5432/ratis_test_purge
          TEST_DATABASE_URL: postgresql+psycopg://ratis:ratis@localhost:5432/ratis_test_purge

  purge:
    name: Run purge
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Record step start (for sentinel duration_s)
        run: echo "STEP_START=$(date -u +%s)" >> "$GITHUB_ENV"
      - name: Install dependencies
        run: uv sync --all-groups --all-packages
      - name: Run purge batch
        run: uv run python batch/ratis_batch_purge/purge.py
        env:
          PYTHONPATH: batch/ratis_batch_purge
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - name: Report outcome to batch-sentinel
        if: always()
        continue-on-error: true
        uses: ./.github/actions/report-batch-outcome
        with:
          webhook_url: ${{ secrets.BATCH_SENTINEL_WEBHOOK_URL }}
          secret: ${{ secrets.BATCH_SENTINEL_WEBHOOK_SECRET }}
          conclusion: ${{ job.status }}

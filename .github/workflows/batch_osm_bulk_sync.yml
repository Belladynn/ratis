name: batch-osm-bulk-sync

on:
  push:
    branches: ["**"]
    paths:
      - "batch/ratis_batch_osm_sync/**"
      - "ratis_core/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/batch_osm_bulk_sync.yml"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry-run (default true for safety)"
        type: boolean
        default: true
      disable_missing:
        description: "Mark missing stores as is_disabled"
        type: boolean
        default: false
      update_pbf:
        description: "Run pyosmium-up-to-date before import"
        type: boolean
        default: true
  # schedule:
  #   - cron: "0 3 * * 0"    # weekly Sunday 03:00 UTC — désactivé (DB locale)

# Serialize runs per ref so a slow scheduled batch never overlaps the next
# tick. cancel-in-progress=false → the new run queues behind the running one.
concurrency:
  group: batch-osm-bulk-sync-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uvx ruff check batch/ratis_batch_osm_sync/

  sast:
    name: SAST (bandit)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      - run: uvx bandit[toml] -r batch/ratis_batch_osm_sync/ -ll -q -c pyproject.toml

  test-bulk:
    name: Tests — ratis_batch_osm_sync (bulk)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint, sast]
    if: github.event_name != 'schedule'
    # Postgres 16 + PostGIS as an ephemeral service container, reachable on
    # localhost (GitHub maps the container port to the runner). The conftest
    # runs `CREATE EXTENSION postgis`, so a PostGIS image is required.
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: ratis
          POSTGRES_PASSWORD: ratis
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Install dependencies
        run: uv sync --all-groups --all-packages
      - name: Create test database
        # Create via psycopg directly — no psql/createdb shell-out needed.
        run: |
          uv run python - <<'PY'
          import psycopg
          conn = psycopg.connect(
              "postgresql://ratis:ratis@localhost:5432/postgres",
              autocommit=True,
          )
          conn.execute("DROP DATABASE IF EXISTS ratis_test_osm_bulk")
          conn.execute("CREATE DATABASE ratis_test_osm_bulk")
          conn.close()
          PY
      - name: Run bulk import tests
        run: uv run pytest batch/ratis_batch_osm_sync/tests/test_osm_bulk_import.py -q
        env:
          PYTHONPATH: batch/ratis_batch_osm_sync
          DATABASE_URL: postgresql+psycopg://ratis:ratis@localhost:5432/ratis_test_osm_bulk
          TEST_DATABASE_URL: postgresql+psycopg://ratis:ratis@localhost:5432/ratis_test_osm_bulk

  bulk-sync:
    name: Weekly OSM bulk sync
    runs-on: ubuntu-latest
    timeout-minutes: 120
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Record step start (for sentinel duration_s)
        run: echo "STEP_START=$(date -u +%s)" >> "$GITHUB_ENV"
      - name: Install dependencies
        run: uv sync --all-groups --all-packages
      - name: Run bulk import
        run: |
          ARGS="--pbf /data/osm/france-latest.osm.pbf"
          if [ "${{ github.event.inputs.update_pbf }}" = "true" ]; then
            ARGS="$ARGS --update"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ "${{ github.event.inputs.disable_missing }}" = "true" ]; then
            ARGS="$ARGS --disable-missing"
          fi
          echo "Running: osm_bulk_import.py $ARGS"
          uv run python batch/ratis_batch_osm_sync/osm_bulk_import.py $ARGS
        env:
          PYTHONPATH: batch/ratis_batch_osm_sync
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - name: Report outcome to batch-sentinel
        if: always()
        continue-on-error: true
        uses: ./.github/actions/report-batch-outcome
        with:
          webhook_url: ${{ secrets.BATCH_SENTINEL_WEBHOOK_URL }}
          secret: ${{ secrets.BATCH_SENTINEL_WEBHOOK_SECRET }}
          conclusion: ${{ job.status }}

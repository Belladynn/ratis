name: batch-annual-reset

on:
  push:
    branches: ["**"]
    paths:
      - "batch/ratis_batch_annual_reset/**"
      - "ratis_core/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/batch_annual_reset.yml"
  workflow_dispatch:
  # schedule:
  #   - cron: "0 0 1 1 *"    # reset annuel 1er janvier 00:00 UTC — désactivé (DB locale)

# Serialize runs per ref so a slow scheduled batch never overlaps the next
# tick. cancel-in-progress=false → the new run queues behind the running one.
concurrency:
  group: batch-annual-reset-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uvx ruff check batch/ratis_batch_annual_reset/

  sast:
    name: SAST (bandit)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      - run: uvx bandit[toml] -r batch/ratis_batch_annual_reset/ -ll -q -c pyproject.toml

  test-annual-reset:
    name: Tests — ratis_batch_annual_reset
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint, sast]
    if: github.event_name != 'schedule'
    # Postgres 16 + PostGIS as an ephemeral service container, reachable on
    # localhost (GitHub maps the container port to the runner). The conftest
    # runs `CREATE EXTENSION postgis`, so a PostGIS image is required.
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: ratis
          POSTGRES_PASSWORD: ratis
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Install dependencies
        run: uv sync --all-groups --all-packages
      - name: Ensure test database exists (idempotent, uses psycopg — no psql on runner)
        run: |
          uv run python -c "
          import psycopg
          with psycopg.connect('postgresql://ratis:ratis@localhost:5432/postgres', autocommit=True) as c:
              with c.cursor() as cur:
                  cur.execute(\"SELECT 1 FROM pg_database WHERE datname='ratis_test_annual_reset'\")
                  if cur.fetchone() is None:
                      cur.execute('CREATE DATABASE ratis_test_annual_reset')
                      print('created ratis_test_annual_reset')
                  else:
                      print('ratis_test_annual_reset already exists')
          "
      - name: Run tests (ratis_batch_annual_reset)
        run: uv run pytest batch/ratis_batch_annual_reset/tests/ -q
        env:
          PYTHONPATH: batch/ratis_batch_annual_reset
          DATABASE_URL: postgresql+psycopg://ratis:ratis@localhost:5432/ratis_test_annual_reset
          TEST_DATABASE_URL: postgresql+psycopg://ratis:ratis@localhost:5432/ratis_test_annual_reset

  annual-reset:
    name: Run annual reset
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Record step start (for sentinel duration_s)
        run: echo "STEP_START=$(date -u +%s)" >> "$GITHUB_ENV"
      - name: Install dependencies
        run: uv sync --all-groups --all-packages
      - name: Run annual reset batch
        run: uv run python batch/ratis_batch_annual_reset/reset.py
        env:
          PYTHONPATH: batch/ratis_batch_annual_reset
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - name: Report outcome to batch-sentinel
        if: always()
        continue-on-error: true
        uses: ./.github/actions/report-batch-outcome
        with:
          webhook_url: ${{ secrets.BATCH_SENTINEL_WEBHOOK_URL }}
          secret: ${{ secrets.BATCH_SENTINEL_WEBHOOK_SECRET }}
          conclusion: ${{ job.status }}

name: batch-off-sync

on:
  push:
    branches: ["**"]
    paths:
      - "batch/ratis_batch_off_sync/**"
      - "ratis_core/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/batch_off_sync.yml"
  workflow_dispatch:
    inputs:
      mode:
        description: "Sync mode"
        required: true
        default: "delta"
        type: choice
        options:
          - delta
          - weekly
          - monthly
          - full
      source:
        description: "Catalogue source filter (empty = run all in matrix)"
        required: false
        default: ""
        type: string
      dump:
        description: "Dump file path (required for mode=full)"
        required: false
        default: ""
        type: string
  # schedule:
  #   # Daily delta — every matrix source runs in parallel (off, obp, opf, opff).
  #   - cron: "0 4 * * *"    # disabled — public repo has no prod DB/secrets; trigger manually via workflow_dispatch

# Serialize runs per ref so a slow scheduled batch never overlaps the next
# tick. cancel-in-progress=false → the new run queues behind the running one.
concurrency:
  group: batch-off-sync-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uvx ruff check batch/ratis_batch_off_sync/

  sast:
    name: SAST (bandit)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      - run: uvx bandit[toml] -r batch/ratis_batch_off_sync/ -ll -q -c pyproject.toml

  test-off-sync:
    name: Tests — ratis_batch_off_sync
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint, sast]
    if: github.event_name != 'schedule'
    # Postgres 16 + PostGIS as an ephemeral service container, reachable on
    # localhost (GitHub maps the container port to the runner). The conftest
    # runs `CREATE EXTENSION postgis`, so a PostGIS image is required.
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: ratis
          POSTGRES_PASSWORD: ratis
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Create test database
        run: psql "postgresql://ratis:ratis@localhost:5432/postgres" -c "CREATE DATABASE ratis_test_off_sync" 2>/dev/null || true
      - name: Install dependencies
        run: uv sync --all-groups
      - name: Run tests (ratis_batch_off_sync)
        run: uv run pytest batch/ratis_batch_off_sync/tests/ -q
        env:
          PYTHONPATH: batch/ratis_batch_off_sync
          DATABASE_URL: postgresql+psycopg://ratis:ratis@localhost:5432/ratis_test_off_sync
          TEST_DATABASE_URL: postgresql+psycopg://ratis:ratis@localhost:5432/ratis_test_off_sync

  off-sync:
    name: Run sync (${{ matrix.source }} / ${{ github.event.inputs.mode || 'delta' }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        source: [off, obp, opf, opff]
    steps:
      - name: Skip if source filter excludes this matrix entry
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.source != '' && matrix.source != github.event.inputs.source }}
        run: |
          echo "Source ${{ matrix.source }} skipped — filter wants ${{ github.event.inputs.source }}."
          exit 0
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.source == '' || matrix.source == github.event.inputs.source }}
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.source == '' || matrix.source == github.event.inputs.source }}
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Record step start (for sentinel duration_s)
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.source == '' || matrix.source == github.event.inputs.source }}
        run: echo "STEP_START=$(date -u +%s)" >> "$GITHUB_ENV"
      - name: Install dependencies
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.source == '' || matrix.source == github.event.inputs.source }}
        run: uv sync --all-groups
      - name: Run sync
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.source == '' || matrix.source == github.event.inputs.source }}
        run: |
          # Compose the CLI : --source + --mode + optional --workers + optional --dump.
          MODE="${{ github.event.inputs.mode || 'delta' }}"
          WORKERS_FLAG=""
          if [ "$MODE" != "delta" ]; then
            WORKERS_FLAG="--workers 8"
          fi
          DUMP_FLAG=""
          if [ "$MODE" = "full" ] && [ -n "${{ github.event.inputs.dump }}" ]; then
            DUMP_FLAG="--dump ${{ github.event.inputs.dump }}"
          fi
          uv run python batch/ratis_batch_off_sync/off_sync/main.py \
            --source ${{ matrix.source }} \
            --mode "$MODE" \
            $WORKERS_FLAG \
            $DUMP_FLAG
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PYTHONPATH: batch/ratis_batch_off_sync
      - name: Report outcome to batch-sentinel
        if: always()
        continue-on-error: true
        uses: ./.github/actions/report-batch-outcome
        with:
          webhook_url: ${{ secrets.BATCH_SENTINEL_WEBHOOK_URL }}
          secret: ${{ secrets.BATCH_SENTINEL_WEBHOOK_SECRET }}
          conclusion: ${{ job.status }}

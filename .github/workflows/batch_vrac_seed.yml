name: batch-vrac-seed

on:
  push:
    branches: ["**"]
    paths:
      - "batch/ratis_batch_vrac_seed/**"
      - "ratis_core/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/batch_vrac_seed.yml"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry-run — log without committing (default: true for safety)"
        type: boolean
        default: true

# Serialize runs per ref so a slow scheduled batch never overlaps the next
# tick. cancel-in-progress=false → the new run queues behind the running one.
concurrency:
  group: batch-vrac-seed-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  conventions:
    name: Conventions
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name != 'workflow_dispatch'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Check assert_no_pending_changes in conftest.py
        run: |
          missing=0
          for conftest in batch/ratis_batch_vrac_seed/tests/conftest.py; do
            if ! grep -q "assert_no_pending_changes" "$conftest"; then
              echo "MISSING assert_no_pending_changes in $conftest"
              missing=1
            fi
          done
          exit $missing

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name != 'workflow_dispatch'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uvx ruff check batch/ratis_batch_vrac_seed/

  sast:
    name: SAST (bandit)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name != 'workflow_dispatch'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      - run: uvx bandit[toml] -r batch/ratis_batch_vrac_seed/ -ll -q -c pyproject.toml

  test-vrac-seed:
    name: Tests — ratis_batch_vrac_seed
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint, sast]
    if: github.event_name != 'workflow_dispatch'
    # Postgres 16 + PostGIS as an ephemeral service container, reachable on
    # localhost (GitHub maps the container port to the runner). The conftest
    # runs `CREATE EXTENSION postgis`, so a PostGIS image is required.
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: ratis
          POSTGRES_PASSWORD: ratis
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Install dependencies
        run: uv sync --all-groups --all-packages
      - name: Create test database
        # Create via psycopg (installed via ratis_core) — no psql/createdb shell-out needed.
        # Idempotent: DROP + CREATE so each run starts from a clean state.
        run: |
          uv run python -c "
          import psycopg
          conn = psycopg.connect('postgresql://ratis:ratis@localhost:5432/postgres', autocommit=True)
          conn.execute('DROP DATABASE IF EXISTS ratis_test_vrac_seed')
          conn.execute('CREATE DATABASE ratis_test_vrac_seed')
          conn.close()
          "
      - name: Run tests (ratis_batch_vrac_seed)
        run: uv run pytest batch/ratis_batch_vrac_seed/tests/ -q
        env:
          PYTHONPATH: batch/ratis_batch_vrac_seed
          DATABASE_URL: postgresql+psycopg://ratis:ratis@localhost:5432/ratis_test_vrac_seed
          TEST_DATABASE_URL: postgresql+psycopg://ratis:ratis@localhost:5432/ratis_test_vrac_seed

  vrac-seed:
    name: Vrac seed (one-shot)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Record step start (for sentinel duration_s)
        run: echo "STEP_START=$(date -u +%s)" >> "$GITHUB_ENV"
      - name: Install dependencies
        run: uv sync --all-groups
      - name: Run vrac seed batch
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="--dry-run"
          fi
          uv run python batch/ratis_batch_vrac_seed/vrac_seed.py $ARGS
        env:
          PYTHONPATH: batch/ratis_batch_vrac_seed
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - name: Report outcome to batch-sentinel
        if: always()
        continue-on-error: true
        uses: ./.github/actions/report-batch-outcome
        with:
          webhook_url: ${{ secrets.BATCH_SENTINEL_WEBHOOK_URL }}
          secret: ${{ secrets.BATCH_SENTINEL_WEBHOOK_SECRET }}
          conclusion: ${{ job.status }}
